<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Enterprise Cybersecurity Homelab">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090B"/>
      <stop offset="55%" stop-color="#0C0A12"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#7C3AED" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#A855F7" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Matte black base -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Subtle blueprint frame -->
  <rect x="48" y="48" width="1104" height="579" rx="18" fill="none" stroke="#27272A" stroke-width="1.5"/>
  <rect x="64" y="64" width="1072" height="547" rx="12" fill="none" stroke="#7C3AED" stroke-opacity="0.18" stroke-width="1"/>

  <!-- Abstract layered infrastructure / topology (right side) -->
  <g transform="translate(690,150)" fill="none" stroke="#A1A1AA" stroke-opacity="0.35" stroke-width="1.5">
    <!-- topology nodes -->
    <circle cx="80" cy="40" r="8" fill="#09090B" stroke="#7C3AED" stroke-opacity="0.75"/>
    <circle cx="220" cy="40" r="8" fill="#09090B" stroke="#7C3AED" stroke-opacity="0.75"/>
    <circle cx="150" cy="120" r="8" fill="#09090B" stroke="#A855F7" stroke-opacity="0.8"/>
    <circle cx="80" cy="200" r="8" fill="#09090B" stroke="#7C3AED" stroke-opacity="0.75"/>
    <circle cx="220" cy="200" r="8" fill="#09090B" stroke="#7C3AED" stroke-opacity="0.75"/>
    <circle cx="150" cy="280" r="8" fill="#09090B" stroke="#A855F7" stroke-opacity="0.8"/>

    <path d="M80 48 V100 H150 V112"/>
    <path d="M220 48 V100 H150 V112"/>
    <path d="M150 128 V160"/>
    <path d="M80 192 V160 H220 V192"/>
    <path d="M80 208 V240 H150 V272"/>
    <path d="M220 208 V240 H150 V272"/>

    <!-- virtualization / layered boxes -->
    <rect x="300" y="60" width="120" height="72" rx="8" stroke="#7C3AED" stroke-opacity="0.55"/>
    <rect x="316" y="84" width="120" height="72" rx="8" stroke="#A855F7" stroke-opacity="0.4"/>
    <rect x="332" y="108" width="120" height="72" rx="8" stroke="#71717A" stroke-opacity="0.55"/>

    <!-- server rack silhouette -->
    <rect x="300" y="220" width="152" height="120" rx="6" stroke="#52525B" stroke-opacity="0.8"/>
    <line x1="316" y1="244" x2="436" y2="244" stroke="#7C3AED" stroke-opacity="0.35"/>
    <line x1="316" y1="268" x2="436" y2="268" stroke="#7C3AED" stroke-opacity="0.28"/>
    <line x1="316" y1="292" x2="436" y2="292" stroke="#7C3AED" stroke-opacity="0.22"/>
    <line x1="316" y1="316" x2="436" y2="316" stroke="#7C3AED" stroke-opacity="0.18"/>
  </g>

  <!-- Brand mark (hexagon E) simplified -->
  <g transform="translate(96,118)">
    <path d="M32 4 54.5 17v26L32 56 9.5 43V17L32 4Z" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linejoin="round"/>
    <path fill="url(#accent)" d="M20 17h24v6H27.5v3.5H39v6H27.5v3.5H44v6H20V17Z"/>
  </g>

  <!-- Text -->
  <text x="96" y="250" fill="#FAFAFA" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="44" font-weight="650" letter-spacing="-0.02em">Enterprise Cybersecurity Homelab</text>
  <text x="96" y="300" fill="#A1A1AA" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="500">Proxmox VE</text>
  <text x="96" y="338" fill="#71717A" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="500" letter-spacing="0.04em">Version 1 Architecture</text>

  <!-- Accent rule -->
  <rect x="96" y="360" width="72" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Footer brand -->
  <text x="96" y="580" fill="#52525B" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="500" letter-spacing="0.08em">ELLIOTTSECURITY</text>
</svg>